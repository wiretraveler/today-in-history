    const ALL_EVENTS = Object.entries(TODAY_EVENTS).flatMap(([dateKey, items]) =>
      items.map(item => ({ ...item, dateKey }))
    );

    function getTodayKey() {
      const now = new Date();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return `${month}-${day}`;
    }

    function formatDateLabel(dateKey) {
      const [month, day] = dateKey.split("-").map(Number);
      const d = new Date(2024, month - 1, day);
      return d.toLocaleDateString(undefined, {
        month: "long",
        day: "numeric"
      });
    }

    function deterministicFallbackIndex(dateKey) {
      const [month, day] = dateKey.split("-").map(Number);
      return (month * 31 + day * 17) % ALL_EVENTS.length;
    }

    function getEventsForToday() {
      const todayKey = getTodayKey();

      if (TODAY_EVENTS[todayKey]) {
        return {
          label: formatDateLabel(todayKey),
          items: TODAY_EVENTS[todayKey]
        };
      }

      const fallback = ALL_EVENTS[deterministicFallbackIndex(todayKey)];
      return {
        label: formatDateLabel(todayKey),
        items: [
          {
            year: fallback.year,
            text: fallback.text
          }
        ]
      };
    }

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function render() {
      const today = getEventsForToday();
      document.getElementById("date").textContent = today.label;

      const html = today.items.map(item => `
        <div class="event">
          <span class="year">${escapeHtml(item.year)}</span>
          <div class="text">${escapeHtml(item.text)}</div>
        </div>
      `).join("");

      document.getElementById("history-container").innerHTML =
        html || '<div class="fallback">No history items available for today.</div>';
    }

    render();
  </script>
