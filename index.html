<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Today in History</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
      font-family: "Segoe UI", sans-serif;
      background: #0f1318;
      color: #f3f4f6;
      text-align: center;
    }

    .wrap {
      width: 100%;
      max-width: 1100px;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 3.2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #f0c84b;
    }

    #date {
      font-size: 1.6rem;
      font-weight: 500;
      color: #cbd5e1;
      margin-bottom: 2rem;
    }

    #history-container {
      max-width: 950px;
      margin: 0 auto;
      background: #181d23;
      padding: 2.5rem 3rem;
      border-radius: 16px;
    }

    .event {
      margin-bottom: 1.75rem;
    }

    .event:last-child {
      margin-bottom: 0;
    }

    .year {
      display: block;
      font-size: 1.35rem;
      font-weight: 700;
      color: #f0c84b;
      margin-bottom: 0.75rem;
    }

    .text {
      font-size: 2.2rem;
      line-height: 1.3;
      color: #f8fafc;
    }

    .fallback {
      font-size: 1.8rem;
      line-height: 1.4;
      color: #e5e7eb;
    }
  </style>
</head>

    };

    const ALL_EVENTS = Object.entries(TODAY_EVENTS).flatMap(([dateKey, items]) =>
      items.map(item => ({ ...item, dateKey }))
    );

    function getTodayKey() {
      const now = new Date();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return `${month}-${day}`;
    }

    function formatDateLabel(dateKey) {
      const [month, day] = dateKey.split("-").map(Number);
      const d = new Date(2024, month - 1, day);
      return d.toLocaleDateString(undefined, {
        month: "long",
        day: "numeric"
      });
    }

    function deterministicFallbackIndex(dateKey) {
      const [month, day] = dateKey.split("-").map(Number);
      return (month * 31 + day * 17) % ALL_EVENTS.length;
    }

    function getEventsForToday() {
      const todayKey = getTodayKey();

      if (TODAY_EVENTS[todayKey]) {
        return {
          label: formatDateLabel(todayKey),
          items: TODAY_EVENTS[todayKey]
        };
      }

      const fallback = ALL_EVENTS[deterministicFallbackIndex(todayKey)];
      return {
        label: formatDateLabel(todayKey),
        items: [
          {
            year: fallback.year,
            text: fallback.text
          }
        ]
      };
    }

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function render() {
      const today = getEventsForToday();
      document.getElementById("date").textContent = today.label;

      const html = today.items.map(item => `
        <div class="event">
          <span class="year">${escapeHtml(item.year)}</span>
          <div class="text">${escapeHtml(item.text)}</div>
        </div>
      `).join("");

      document.getElementById("history-container").innerHTML =
        html || '<div class="fallback">No history items available for today.</div>';
    }

    render();
  </script>
</body>
</html>
