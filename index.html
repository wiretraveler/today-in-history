<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Today in History</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
      font-family: "Segoe UI", sans-serif;
      background: #121417;
      color: #f3f4f6;
      text-align: center;
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #f0c84b;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    #date {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 2rem;
      color: #c9d1d9;
    }

    #history-container {
      max-width: 900px;
      width: 100%;
      background: #1b1f24;
      padding: 2.25rem;
      border-radius: 20px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.28);
    }

    .event {
      margin-bottom: 1.75rem;
    }

    .event:last-child {
      margin-bottom: 0;
    }

    .year {
      display: block;
      font-size: 1.4rem;
      font-weight: 700;
      color: #f0c84b;
      margin-bottom: 0.4rem;
    }

    .text {
      font-size: 2rem;
      line-height: 1.35;
      color: #f3f4f6;
    }

    .fallback {
      font-size: 1.8rem;
      line-height: 1.4;
      color: #e5e7eb;
    }
  </style>
</head>
<body>
  <h1>On This Day</h1>
  <div id="date">Loading...</div>
  <div id="history-container">Loading today in history...</div>

  <script>
    const TODAY_EVENTS = {
      "01-28": [
        {
          year: "1958",
          text: "The LEGO brick patent application was filed, helping define the interlocking brick design used today."
        }
      ],
      "04-23": [
        {
          year: "2005",
          text: "The first video was uploaded to YouTube, a short clip titled “Me at the zoo.”"
        }
      ],
      "05-24": [
        {
          year: "1844",
          text: "Samuel Morse sent the first long-distance telegraph message between Washington and Baltimore."
        }
      ],
      "07-20": [
        {
          year: "1969",
          text: "Apollo 11 astronauts Neil Armstrong and Buzz Aldrin landed on the Moon."
        }
      ],
      "09-05": [
        {
          year: "1977",
          text: "NASA launched Voyager 1, which later became the most distant human-made object."
        }
      ],
      "12-17": [
        {
          year: "1903",
          text: "Wilbur and Orville Wright made the first successful powered airplane flights at Kitty Hawk."
        }
      ]
    };

    const ALL_EVENTS = Object.entries(TODAY_EVENTS).flatMap(([dateKey, items]) =>
      items.map(item => ({ ...item, dateKey }))
    );

    function getTodayKey() {
      const now = new Date();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return `${month}-${day}`;
    }

    function formatDateLabel(dateKey) {
      const [month, day] = dateKey.split("-").map(Number);
      const d = new Date(2024, month - 1, day);
      return d.toLocaleDateString(undefined, {
        month: "long",
        day: "numeric"
      });
    }

    function deterministicFallbackIndex(dateKey) {
      const [month, day] = dateKey.split("-").map(Number);
      return (month * 31 + day * 17) % ALL_EVENTS.length;
    }

    function getEventsForToday() {
      const todayKey = getTodayKey();

      if (TODAY_EVENTS[todayKey]) {
        return {
          label: formatDateLabel(todayKey),
          items: TODAY_EVENTS[todayKey]
        };
      }

      const fallback = ALL_EVENTS[deterministicFallbackIndex(todayKey)];
      return {
        label: formatDateLabel(todayKey),
        items: [
          {
            year: fallback.year,
            text: fallback.text
          }
        ]
      };
    }

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function render() {
      const today = getEventsForToday();
      document.getElementById("date").textContent = today.label;

      const html = today.items.map(item => `
        <div class="event">
          <span class="year">${escapeHtml(item.year)}</span>
          <div class="text">${escapeHtml(item.text)}</div>
        </div>
      `).join("");

      document.getElementById("history-container").innerHTML =
        html || '<div class="fallback">No history items available for today.</div>';
    }

    render();
  </script>
</body>
</html>
