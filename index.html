<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>On This Day</title>
  <style>
    :root {
      --bg: #111214;
      --text: #f4f6f8;
      --muted: #adb5bf;
      --accent: #f0c84b;
      --line: rgba(255,255,255,0.08);
      --panelTop: #23272c;
      --panelBottom: #1a1d21;
      --card: rgba(255,255,255,0.05);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background:
        radial-gradient(circle at top right, rgba(255,255,255,0.03), transparent 22%),
        linear-gradient(180deg, #16181b 0%, #101113 100%);
    }

    .board {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: 1.15fr 1fr;
      overflow: hidden;
      background: linear-gradient(135deg, #1c1f23 0%, #111214 62%, #191d21 100%);
    }

    .hero {
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 22% 20%, rgba(240,200,75,0.14), transparent 18%),
        radial-gradient(circle at 72% 38%, rgba(255,255,255,0.05), transparent 20%),
        linear-gradient(135deg, #2b2f34 0%, #17191c 100%);
      display: grid;
      place-items: center;
      padding: 4vw;
    }

    .hero::before {
      content: "TODAY";
      position: absolute;
      inset: auto auto 6% 6%;
      font-size: clamp(90px, 13vw, 240px);
      font-weight: 900;
      letter-spacing: -0.07em;
      line-height: 0.9;
      color: rgba(255,255,255,0.05);
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      width: min(86%, 760px);
    }

    .kicker {
      margin: 0 0 18px;
      color: var(--accent);
      font-size: clamp(18px, 1vw, 24px);
      font-weight: 900;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .hero-title {
      margin: 0 0 20px;
      font-size: clamp(54px, 5.2vw, 98px);
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: -0.06em;
      text-wrap: balance;
    }

    .hero-subtitle {
      margin: 0;
      max-width: 24ch;
      font-size: clamp(22px, 1.65vw, 34px);
      line-height: 1.24;
      color: #d8dde4;
    }

    .panel {
      position: relative;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      padding: clamp(22px, 2.2vh, 34px) clamp(24px, 2vw, 38px) clamp(18px, 2vh, 28px);
      background: linear-gradient(180deg, var(--panelTop) 0%, var(--panelBottom) 100%);
      border-left: 1px solid rgba(255,255,255,0.06);
      overflow: hidden;
    }

    .panel::before {
      content: "HISTORY";
      position: absolute;
      right: -14px;
      top: 50%;
      transform: translateY(-50%) rotate(-90deg);
      font-size: clamp(110px, 11vw, 170px);
      font-weight: 900;
      letter-spacing: -0.06em;
      color: rgba(255,255,255,0.035);
      pointer-events: none;
    }

    .title {
      position: relative;
      z-index: 1;
      font-size: clamp(18px, 1.1vw, 22px);
      font-weight: 900;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .date-pill {
      position: relative;
      z-index: 1;
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      width: fit-content;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 14px 0 0 14px;
      background: linear-gradient(90deg, #f3cf57, #efbd1c);
      color: #171717;
      font-size: clamp(14px, 0.9vw, 16px);
      font-weight: 900;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .date-pill::before {
      content: "";
      width: 12px;
      height: 12px;
      border: 3px solid currentColor;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .events {
      position: relative;
      z-index: 1;
      margin-top: 26px;
      display: grid;
      gap: 16px;
      align-content: center;
      min-height: 0;
    }

    .event {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 20px 22px;
      backdrop-filter: blur(4px);
    }

    .event-year {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: clamp(18px, 1vw, 24px);
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .event-text {
      margin: 0;
      font-size: clamp(22px, 1.5vw, 30px);
      line-height: 1.24;
      color: #edf1f5;
      text-wrap: balance;
    }

    .footer {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: clamp(14px, 0.9vw, 16px);
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .meta-left {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .meta-left::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #38d39f;
      box-shadow: 0 0 0 4px rgba(56,211,159,0.14);
    }

    .loading {
      display: grid;
      place-items: center;
      height: 100%;
      font-size: 24px;
      font-weight: 700;
    }

    @media (max-width: 1600px), (max-height: 950px) {
      .board { grid-template-columns: 1.05fr 1fr; }
      .hero-title { font-size: clamp(46px, 4.4vw, 78px); }
      .hero-subtitle { font-size: clamp(20px, 1.4vw, 28px); }
      .event-text { font-size: clamp(19px, 1.25vw, 25px); }
    }

    @media (max-width: 1100px) {
      .board { grid-template-columns: 1fr; }
      .hero { display: none; }
      .panel { padding: 24px 24px 18px; }
      .event-text { font-size: clamp(18px, 1.4vw, 22px); }
    }
  </style>
</head>
<body>
  <main class="board">
    <section class="hero">
      <div class="hero-inner">
        <p class="kicker">Safe History</p>
        <h1 class="hero-title">On This Day</h1>
        <p class="hero-subtitle">
          Positive, factual milestones selected for all-ages display screens.
        </p>
      </div>
    </section>

    <aside class="panel">
      <div class="title">On This Day</div>
      <div class="date-pill" id="datePill">Loading…</div>
      <div class="events" id="events">
        <div class="loading">Loading today’s milestones…</div>
      </div>

      <div class="footer">
        <div class="meta-left" id="metaText">All-ages factual history</div>
        <div id="sourceText">Source: Local curated list</div>
      </div>
    </aside>
  </main>

  <script>
    const TODAY_EVENTS = {
      "01-28": [
        {
          year: "1958",
          text: "The LEGO brick patent application was filed, helping define the interlocking brick design used today."
        }
      ],
      "04-23": [
        {
          year: "2005",
          text: "The first video was uploaded to YouTube, a short clip titled “Me at the zoo.”"
        }
      ],
      "05-24": [
        {
          year: "1844",
          text: "Samuel Morse sent the first long-distance telegraph message between Washington and Baltimore."
        }
      ],
      "07-20": [
        {
          year: "1969",
          text: "Apollo 11 astronauts Neil Armstrong and Buzz Aldrin landed on the Moon."
        }
      ],
      "09-05": [
        {
          year: "1977",
          text: "NASA launched Voyager 1, which later became the most distant human-made object."
        }
      ],
      "12-17": [
        {
          year: "1903",
          text: "Wilbur and Orville Wright made the first successful powered airplane flights at Kitty Hawk."
        }
      ]
    };

    const ALL_EVENTS = Object.entries(TODAY_EVENTS).flatMap(([dateKey, items]) =>
      items.map(item => ({ ...item, dateKey }))
    );

    const eventsEl = document.getElementById("events");
    const datePillEl = document.getElementById("datePill");

    function getTodayKey() {
      const now = new Date();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return `${month}-${day}`;
    }

    function formatDateLabel(dateKey) {
      const [month, day] = dateKey.split("-").map(Number);
      const d = new Date(2024, month - 1, day);
      return d.toLocaleDateString(undefined, {
        month: "long",
        day: "numeric"
      });
    }

    function deterministicFallbackIndex(dateKey) {
      const [month, day] = dateKey.split("-").map(Number);
      return (month * 31 + day * 17) % ALL_EVENTS.length;
    }

    function getEventsForToday() {
      const todayKey = getTodayKey();
      if (TODAY_EVENTS[todayKey]) {
        return {
          dateKey: todayKey,
          label: formatDateLabel(todayKey),
          items: TODAY_EVENTS[todayKey]
        };
      }

      const fallback = ALL_EVENTS[deterministicFallbackIndex(todayKey)];
      return {
        dateKey: todayKey,
        label: `${formatDateLabel(todayKey)} · Featured`,
        items: [
          {
            year: fallback.year,
            text: fallback.text
          }
        ]
      };
    }

    function render() {
      const today = getEventsForToday();
      datePillEl.textContent = today.label;

      eventsEl.innerHTML = today.items.map(item => `
        <article class="event">
          <p class="event-year">${item.year}</p>
          <p class="event-text">${escapeHtml(item.text)}</p>
        </article>
      `).join("");
    }

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    render();
  </script>
</body>
</html>
